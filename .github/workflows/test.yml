name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build AmateurDigitalCore
        run: cd AmateurDigital/AmateurDigitalCore && swift build

      - name: Run unit tests
        run: cd AmateurDigital/AmateurDigitalCore && swift test

      - name: Run RTTY benchmark (regression check)
        run: |
          cd AmateurDigital/AmateurDigitalCore
          swift run -c release RTTYBenchmark 2>&1 | tee /tmp/bench.txt

      - name: Check benchmark score
        run: |
          python3 -c "
          import json
          with open('/tmp/rtty_benchmark_latest.json') as f:
              score = json.load(f)['composite_score']
          print(f'RTTY Composite Score: {score:.1f}/100')
          assert score >= 88.0, f'REGRESSION: Score {score:.1f} below baseline 88.0'
          print('No regression detected')
          "
